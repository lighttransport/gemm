<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAM 3D Body — single-image full-body 3D mesh recovery</title>
  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f7f8fb; color: #15171a; }
    main { max-width: 1400px; margin: 0 auto; padding: 20px 16px; }
    h1 { font-size: 24px; margin: 0 0 4px; }
    .sub { color: #6a7180; font-size: 13px; margin-bottom: 16px; }
    .sub code { background: #eceff3; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    .panel, form { background: #fff; border: 1px solid #d9dde5; border-radius: 8px; padding: 14px; margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 650; margin: 8px 0 4px; }
    input, select, button { width: 100%; border: 1px solid #bcc4d0; border-radius: 6px; font: inherit; padding: 8px 10px; background: #fff; }
    button { background: #1b6f5f; color: #fff; border: 0; font-weight: 700; cursor: pointer; }
    button[disabled] { background: #9aa4b1; cursor: not-allowed; }
    button.cancel { background: #b94a48; }
    button.secondary { background: #4a6585; }
    .row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
    .minirow { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
    .btn-row { display: flex; gap: 10px; margin-top: 12px; }
    .btn-row button { margin-top: 0; }
    .status { margin-top: 8px; font-size: 12px; color: #6a7180; min-height: 16px; }
    .backends { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 6px; margin-top: 6px; }
    .be-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid #e1e5ec; border-radius: 6px; font-size: 13px; }
    .be-row input[type=checkbox] { width: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 12px; }
    .cell { background: #fff; border: 1px solid #d9dde5; border-radius: 8px; padding: 12px; }
    .cell h3 { margin: 0 0 6px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .cell .meta { font-size: 12px; color: #6a7180; margin-bottom: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .cell .canvas-wrap { position: relative; width: 100%; height: 360px; background: #1a1c20; border-radius: 6px; border: 1px solid #d9dde5; overflow: hidden; }
    .cell .canvas-wrap canvas { display: block; }
    .cell .err { color: #b94a48; font-size: 13px; padding: 8px; background: #fdecec; border-radius: 6px; }
    .cell .dl { margin-top: 6px; font-size: 12px; }
    .cell .dl a { color: #1b6f5f; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #e6f3ef; color: #1b6f5f; }
    .pill.run  { background: #e7effa; color: #2a4a7a; }
    .pill.err  { background: #fdecec; color: #b94a48; }
    .origin-pill { display: inline-block; padding: 1px 6px; border-radius: 4px; background: #eceff3; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: #2a4a7a; }
    #preview-wrap { position: relative; max-width: 280px; margin-top: 6px; }
    #preview { display: block; width: 100%; max-height: 320px; object-fit: contain; border: 1px solid #d9dde5; border-radius: 6px; background: #eceff3; cursor: crosshair; user-select: none; }
    #bbox-ov { position: absolute; pointer-events: none; border: 2px solid #1b6f5f; background: rgba(27,111,95,0.12); display: none; }
    .bbox-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .auto-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; }
    .auto-row input[type=checkbox] { width: auto; }
    .gallery { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .gallery .thumb { width: 64px; height: 64px; border-radius: 6px; border: 2px solid transparent; object-fit: cover; cursor: pointer; background: #eceff3; }
    .gallery .thumb:hover { border-color: #1b6f5f; }
    .gallery .thumb.selected { border-color: #1b6f5f; }
    .gallery .empty { color: #6a7180; font-size: 12px; padding: 4px 0; }
    #toast { position: fixed; top: 18px; right: 18px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; max-width: min(420px, 90vw); }
    .toast-item { pointer-events: auto; background: #15171a; color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.35; border-left: 4px solid #8a8f98; cursor: pointer; word-break: break-word; }
    .toast-item.error { border-left-color: #e5484d; background: #2a1416; }
    .toast-item.info  { border-left-color: #1b6f5f; }
  </style>
</head>
<body>
<div id="toast"></div>
<main>
  <h1>SAM 3D Body</h1>
  <div class="sub">
    Single-image, full-body 3D mesh recovery. Drop an image; the runner emits an
    18 439-vertex / 36 874-triangle mesh.
    Backend origin: <span class="origin-pill" id="origin-label"></span>
    <span style="color:#6a7180;"> — override with <code>?origin=http://host:port</code>.</span>
  </div>

  <form id="form" class="panel">
    <div class="row">
      <div>
        <label for="file">Input image (PNG / JPG)</label>
        <input id="file" type="file" accept="image/*">
        <div id="gallery" class="gallery"></div>
        <div id="preview-wrap">
          <img id="preview" alt="">
          <div id="bbox-ov"></div>
        </div>
        <div class="auto-row">
          <input id="auto-bbox" type="checkbox" checked>
          <label for="auto-bbox" style="margin:0;">Auto-detect person (RT-DETR-S)</label>
        </div>
        <label style="margin-top:6px;">Bbox <small style="color:#6a7180;font-weight:400">(drag on preview, or type)</small></label>
        <div class="bbox-row">
          <input id="x0" type="number" placeholder="x0">
          <input id="y0" type="number" placeholder="y0">
          <input id="x1" type="number" placeholder="x1">
          <input id="y1" type="number" placeholder="y1">
        </div>
        <div class="minirow" style="margin-top:8px;">
          <div><label for="auto-thresh">RT-DETR thresh</label><input id="auto-thresh" type="number" step="0.05" min="0" max="1" value="0.5"></div>
          <div><label for="focal">Focal hint</label><input id="focal" type="number" step="1" placeholder="0 = auto"></div>
          <div>
            <label>Backbone</label>
            <div style="display:flex;gap:10px;align-items:center;">
              <label style="display:flex;gap:4px;align-items:center;font-weight:400;margin:0;">
                <input type="radio" name="backbone" value="dinov3" checked>dinov3-h+
              </label>
              <label style="display:flex;gap:4px;align-items:center;font-weight:400;margin:0;">
                <input type="radio" name="backbone" value="vith">vit-h
              </label>
            </div>
          </div>
          <div></div>
        </div>
      </div>
      <div>
        <label>Backends</label>
        <div id="backends" class="backends"></div>
      </div>
      <div>
        <label>&nbsp;</label>
        <div class="btn-row">
          <button type="submit" id="go">Run</button>
          <button type="button" id="cancel" class="cancel" disabled>Cancel</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </div>
  </form>

  <section id="grid" class="grid"></section>
</main>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';

const $ = id => document.getElementById(id);

function resolveOrigin() {
  const q = new URLSearchParams(location.search).get('origin');
  if (q) return q;
  if (window.SAM3D_BODY_ORIGIN) return window.SAM3D_BODY_ORIGIN;
  return `${location.protocol}//${location.hostname}:8088`;
}
const ORIGIN = resolveOrigin();
$('origin-label').textContent = ORIGIN;

const DEFAULT_BACKENDS = [
  { label: "ours (cpu)",     id: "ours-cpu",     defaultOff: true },
  { label: "ours (cuda)",    id: "ours-cuda" },
  { label: "pytorch (cuda)", id: "pytorch-cuda" },
];
const BACKENDS = DEFAULT_BACKENDS;

function showToast(msg, opts) {
  opts = opts || {};
  const host = $('toast');
  const el = document.createElement('div');
  el.className = 'toast-item ' + (opts.kind || 'error');
  if (opts.title) {
    const t = document.createElement('div');
    t.style.fontWeight = '700'; t.textContent = opts.title;
    el.appendChild(t);
  }
  const b = document.createElement('div'); b.textContent = msg;
  el.appendChild(b);
  host.appendChild(el);
  el.addEventListener('click', () => el.remove());
  setTimeout(() => { el.style.opacity = '0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),400); }, 5500);
}

function extractError(res, body) {
  if (body && typeof body === 'object' && body.error) return body.error;
  if (!res) return 'network error';
  return `HTTP ${res.status} ${res.statusText || ''}`.trim();
}

let AVAILABLE_BACKENDS = null;
let IMAGE_B64 = null;
let IMAGE_W = 0, IMAGE_H = 0;

/* ---- Image upload + bbox UI ---- */

$('file').addEventListener('change', async ev => {
  const f = ev.target.files[0];
  if (!f) return;
  const buf = await f.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  IMAGE_B64 = btoa(bin);
  const url = URL.createObjectURL(f);
  const img = $('preview');
  img.src = url;
  img.onload = () => { IMAGE_W = img.naturalWidth; IMAGE_H = img.naturalHeight; };
  for (const k of ['x0','y0','x1','y1']) $(k).value = '';
  $('bbox-ov').style.display = 'none';
});

(function bboxDraw() {
  const img = $('preview');
  const ov = $('bbox-ov');
  let dragging = false, sx = 0, sy = 0;
  const px = (clientX, clientY) => {
    const r = img.getBoundingClientRect();
    return { x: clientX - r.left, y: clientY - r.top, w: r.width, h: r.height };
  };
  const setBox = (x0px, y0px, x1px, y1px, rect) => {
    const left = Math.min(x0px, x1px), top = Math.min(y0px, y1px);
    const w = Math.abs(x1px - x0px), h = Math.abs(y1px - y0px);
    ov.style.left = left + 'px'; ov.style.top = top + 'px';
    ov.style.width = w + 'px';   ov.style.height = h + 'px';
    ov.style.display = (w > 2 && h > 2) ? 'block' : 'none';
    /* convert to image-space */
    if (IMAGE_W && IMAGE_H && rect) {
      const sx = IMAGE_W / rect.w, sy = IMAGE_H / rect.h;
      $('x0').value = (Math.min(x0px, x1px) * sx).toFixed(0);
      $('y0').value = (Math.min(y0px, y1px) * sy).toFixed(0);
      $('x1').value = (Math.max(x0px, x1px) * sx).toFixed(0);
      $('y1').value = (Math.max(y0px, y1px) * sy).toFixed(0);
    }
  };
  img.addEventListener('mousedown', e => {
    if (!IMAGE_W) return;
    e.preventDefault();
    const p = px(e.clientX, e.clientY); sx = p.x; sy = p.y; dragging = true;
    $('auto-bbox').checked = false;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const p = px(e.clientX, e.clientY);
    const ex = Math.max(0, Math.min(p.x, p.w));
    const ey = Math.max(0, Math.min(p.y, p.h));
    setBox(sx, sy, ex, ey, p);
  });
  window.addEventListener('mouseup', () => { dragging = false; });
})();

/* ---- Sample gallery ---- */

async function loadSamples() {
  const host = $('gallery'); host.innerHTML = '';
  try {
    const r = await fetch(ORIGIN + '/v1/samples');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const list = (d && d.samples) || [];
    if (!list.length) {
      host.innerHTML = '<div class="empty">no samples — drop images into web/public/sam3d_body/</div>';
      return;
    }
    list.forEach(s => {
      const url = ORIGIN + s.url;
      const im = new Image();
      im.className = 'thumb';
      im.src = url;
      im.title = s.name;
      im.addEventListener('click', () => loadSample(url, s.name, im));
      host.appendChild(im);
    });
  } catch (e) {
    host.innerHTML = `<div class="empty">samples unavailable (${e.message || e})</div>`;
  }
}

async function loadSample(url, name, thumbEl) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const buf = await r.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    IMAGE_B64 = btoa(bin);
    const img = $('preview');
    img.src = url;
    img.onload = () => { IMAGE_W = img.naturalWidth; IMAGE_H = img.naturalHeight; };
    for (const k of ['x0','y0','x1','y1']) $(k).value = '';
    $('bbox-ov').style.display = 'none';
    /* Mark selected */
    Array.from($('gallery').querySelectorAll('.thumb')).forEach(
      el => el.classList.toggle('selected', el === thumbEl));
  } catch (e) {
    showToast(`failed to load ${name}: ${e.message || e}`);
  }
}
loadSamples();

/* ---- Backends ---- */

async function loadBackends() {
  try {
    const r = await fetch(ORIGIN + '/v1/models');
    const d = await r.json();
    const m = (d.models && d.models[0]) || {};
    AVAILABLE_BACKENDS = new Set(m.backends || []);
  } catch (e) {
    showToast(`failed to reach ${ORIGIN}/v1/models: ${e}. Start the sam3d_body server: PORT=8088 ./server/run-sam3d-body.sh`,
              {title:'sam3d_body server'});
  }
  renderBackends();
}
loadBackends();

function renderBackends() {
  const host = $('backends'); host.innerHTML = '';
  BACKENDS.forEach((b, i) => {
    const row = document.createElement('label');
    row.className = 'be-row';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.dataset.idx = i;
    const advertised = !AVAILABLE_BACKENDS || AVAILABLE_BACKENDS.has(b.id);
    cb.checked = advertised && !b.defaultOff;
    cb.disabled = !advertised;
    row.appendChild(cb);
    const lab = document.createElement('span');
    lab.textContent = b.label + (advertised ? '' : ' (n/a)');
    row.appendChild(lab);
    host.appendChild(row);
  });
}
renderBackends();

/* ---- 3D viewer cell ---- */

function mkCell(label) {
  const sec = document.createElement('section');
  sec.className = 'cell';
  sec.innerHTML = `
    <h3><span class="label"></span> <span class="pill run status">running</span></h3>
    <div class="meta"></div>
    <div class="canvas-wrap"></div>
    <div class="dl" style="display:none;"></div>
    <div class="err" style="display:none;"></div>
  `;
  sec.querySelector('.label').textContent = label;
  return sec;
}

function attachViewer(wrap, objText) {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x1a1c20);
  wrap.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0xffffff, 0x404050, 1.0));
  const dl = new THREE.DirectionalLight(0xffffff, 0.6);
  dl.position.set(2, 4, 5); scene.add(dl);

  const camera = new THREE.PerspectiveCamera(35, W / H, 0.01, 100);
  camera.position.set(0, 0, 2.5);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const obj = new OBJLoader().parse(objText);
  obj.traverse(child => {
    if (child.isMesh) {
      child.material = new THREE.MeshStandardMaterial({
        color: 0xc7d0d8, roughness: 0.6, metalness: 0.0, flatShading: true,
      });
      child.geometry.computeVertexNormals();
    }
  });
  /* Sam3d-body emits a Y-down camera-space mesh. Flip Y so the
     person stands upright in OrbitControls' default Y-up frame. */
  obj.rotation.x = Math.PI;
  scene.add(obj);

  /* Frame the mesh */
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim / (2 * Math.tan(THREE.MathUtils.degToRad(camera.fov) / 2)) * 1.5;
  camera.position.copy(center).add(new THREE.Vector3(0, 0, dist));
  controls.target.copy(center);
  camera.near = Math.max(0.001, dist * 0.01);
  camera.far  = dist * 100;
  camera.updateProjectionMatrix();

  let alive = true;
  const animate = () => {
    if (!alive) return;
    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  };
  animate();

  const onResize = () => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  };
  const ro = new ResizeObserver(onResize);
  ro.observe(wrap);

  return { dispose: () => { alive = false; ro.disconnect(); renderer.dispose(); } };
}

/* ---- Run ---- */

let running = [];
let viewers = [];

function cancelAll() {
  for (const c of running) { try { c.abort(); } catch(_){} }
  running = [];
  $('cancel').disabled = true;
  $('go').disabled = false;
  $('status').textContent = 'cancelled.';
}
$('cancel').addEventListener('click', cancelAll);

function clearViewers() {
  for (const v of viewers) { try { v.dispose(); } catch(_){} }
  viewers = [];
}

async function runOne(be, body, grid) {
  const cell = mkCell(be.label);
  grid.appendChild(cell);
  const pill = cell.querySelector('.pill');
  const meta = cell.querySelector('.meta');
  const wrap = cell.querySelector('.canvas-wrap');
  const dl   = cell.querySelector('.dl');
  const errEl = cell.querySelector('.err');

  const ctrl = new AbortController(); running.push(ctrl);
  const t0 = performance.now();
  const ticker = setInterval(() => {
    pill.textContent = 'running ' + ((performance.now() - t0) / 1000).toFixed(1) + 's';
  }, 200);

  try {
    const payload = Object.assign({}, body);
    payload.params = Object.assign({}, body.params || {}, { backend: be.id });
    const res = await fetch(ORIGIN + '/v1/infer', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctrl.signal,
    });
    let data = null;
    try { data = await res.json(); } catch(_) { data = null; }
    if (!res.ok || !data || data.ok === false) {
      throw new Error(extractError(res, data));
    }
    clearInterval(ticker);
    const dt = ((performance.now() - t0) / 1000).toFixed(2) + 's';
    pill.className = 'pill'; pill.textContent = 'ok ' + dt;

    const out = (data.outputs && data.outputs[0]) || null;
    if (!out || !out.data_base64) throw new Error('no mesh output');
    const tm = data.timings_ms || {};
    const bb = out.bbox_used || null;
    meta.textContent =
      `${out.n_verts||0} verts / ${out.n_faces||0} faces  ` +
      `infer=${tm.infer||0}ms total=${tm.total||0}ms` +
      (bb ? `  bbox=[${bb.map(x=>x.toFixed(1)).join(', ')}]` : '');

    /* Decode OBJ text */
    const objBytes = atob(out.data_base64);
    let objText = '';
    /* atob produces a binary string; OBJ is ASCII so this is fine */
    objText = objBytes;

    const v = attachViewer(wrap, objText);
    viewers.push(v);

    /* Download link */
    const blob = new Blob([objText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    dl.style.display = '';
    const a = document.createElement('a');
    a.href = url; a.download = `sam3d-body-${be.id}.obj`;
    a.textContent = 'download .obj';
    dl.innerHTML = ''; dl.appendChild(a);
  } catch (e) {
    clearInterval(ticker);
    pill.className = 'pill err'; pill.textContent = 'error';
    errEl.style.display = 'block';
    errEl.textContent = String(e.message || e);
    if (e.name !== 'AbortError') showToast(String(e.message || e), {title: be.label});
  }
}

$('form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  if (!IMAGE_B64) { showToast('choose an input image'); return; }

  const checked = Array.from(document.querySelectorAll('#backends input[type=checkbox]:checked'))
    .map(cb => BACKENDS[+cb.dataset.idx]);
  if (!checked.length) { showToast('check at least one backend'); return; }

  $('go').disabled = true; $('cancel').disabled = false;
  const grid = $('grid');
  clearViewers();
  grid.innerHTML = '';

  const useAuto = $('auto-bbox').checked;
  const inputs = { image_base64: IMAGE_B64 };
  let manualBbox = null;
  if (!useAuto) {
    const x0 = parseFloat($('x0').value), y0 = parseFloat($('y0').value);
    const x1 = parseFloat($('x1').value), y1 = parseFloat($('y1').value);
    if (![x0, y0, x1, y1].every(Number.isFinite)) {
      showToast('enter all four bbox values, or check auto-detect'); return;
    }
    manualBbox = [x0, y0, x1, y1];
    inputs.bbox = manualBbox;
  }
  const params = {
    auto_thresh: parseFloat($('auto-thresh').value),
  };
  const focal = parseFloat($('focal').value);
  if (Number.isFinite(focal) && focal > 0) params.focal = focal;
  const backbone = (document.querySelector('input[name="backbone"]:checked') || {}).value || 'dinov3';
  if (backbone !== 'dinov3') params.backbone = backbone;

  const baseBody = { inputs, params };

  /* PyTorch backend requires a bbox up-front (no detectron2 in the venv).
   * When auto-detect is on AND pytorch is selected, run a "detector"
   * backend first (preferring ours-cuda for speed, falling back to
   * ours-cpu) to get the bbox, then fan out to everyone with that bbox. */
  const wantsPy = checked.some(b => b.id === 'pytorch-cuda');
  const detector = checked.find(b => b.id === 'ours-cuda')
                || checked.find(b => b.id === 'ours-cpu');

  if (useAuto && wantsPy && detector) {
    $('status').textContent = `auto-detecting bbox via ${detector.label}…`;
    const detBody = JSON.parse(JSON.stringify(baseBody));
    /* runOne renders a cell so the user sees detection progress. */
    await runOne(detector, detBody, grid);
    /* The cell's meta line carries the bbox; also stash a copy on a
     * dataset for programmatic recovery. */
    let detBbox = null;
    const cells = grid.querySelectorAll('.cell .meta');
    if (cells.length) {
      const m = cells[cells.length - 1].textContent.match(
        /bbox=\[([-\d.]+),\s*([-\d.]+),\s*([-\d.]+),\s*([-\d.]+)\]/);
      if (m) detBbox = [parseFloat(m[1]), parseFloat(m[2]),
                        parseFloat(m[3]), parseFloat(m[4])];
    }
    if (!detBbox) {
      showToast('detector finished but no bbox parsed — running pytorch may fail');
    } else {
      baseBody.inputs.bbox = detBbox;
    }
    /* Drop the detector from the remaining fan-out (it already ran). */
    const remaining = checked.filter(b => b.id !== detector.id);
    if (!remaining.length) {
      running = []; $('cancel').disabled = true; $('go').disabled = false;
      $('status').textContent = 'done.'; return;
    }
    $('status').textContent = `running ${remaining.length} more backend(s)…`;
    await Promise.allSettled(remaining.map(be => runOne(be, baseBody, grid)));
  } else {
    if (useAuto && wantsPy && !detector) {
      showToast('pytorch-cuda needs a bbox. Either disable auto-detect '
              + 'and enter a bbox manually, or also check ours-cuda / ours-cpu '
              + 'so the detector can run first.');
      $('go').disabled = false; $('cancel').disabled = true;
      $('status').textContent = '';
      return;
    }
    $('status').textContent = `running ${checked.length} backend(s)…`;
    await Promise.allSettled(checked.map(be => runOne(be, baseBody, grid)));
  }

  running = [];
  $('cancel').disabled = true;
  $('go').disabled = false;
  $('status').textContent = 'done.';
});
</script>
</body>
</html>
