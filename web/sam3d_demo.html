<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAM 3D Body — ours vs pytorch (3-pane demo)</title>
  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f4f6f9; color: #15171a; }
    main { max-width: 1500px; margin: 0 auto; padding: 18px 16px 40px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .sub { color: #6a7180; font-size: 13px; margin-bottom: 14px; }
    form, .panel { background: #fff; border: 1px solid #d9dde5; border-radius: 8px;
                   padding: 14px; margin-bottom: 14px; }
    label { display: block; font-size: 13px; font-weight: 650; margin: 8px 0 4px; }
    input, select, button { width: 100%; border: 1px solid #bcc4d0; border-radius: 6px;
                            font: inherit; padding: 8px 10px; background: #fff; }
    button { background: #1b6f5f; color: #fff; border: 0; font-weight: 700; cursor: pointer; }
    button[disabled] { background: #9aa4b1; cursor: not-allowed; }
    .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
    .bbox-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .auto-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 13px; }
    .auto-row input[type=checkbox] { width: auto; }
    #preview-wrap { position: relative; max-width: 320px; margin-top: 6px; }
    #preview { display: block; width: 100%; max-height: 360px; object-fit: contain;
               border: 1px solid #d9dde5; border-radius: 6px; background: #eceff3;
               cursor: crosshair; user-select: none; }
    #bbox-ov { position: absolute; pointer-events: none; border: 2px solid #1b6f5f;
               background: rgba(27,111,95,0.15); display: none; }
    .panes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 1100px) { .panes { grid-template-columns: 1fr; } }
    .pane { background: #fff; border: 1px solid #d9dde5; border-radius: 8px; padding: 12px; }
    .pane h3 { margin: 0 0 6px; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .pane .meta { font-size: 12px; color: #6a7180; margin-bottom: 8px;
                  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                  white-space: pre-wrap; }
    .pane .canvas-wrap { position: relative; width: 100%; height: 420px;
                         background: #1a1c20; border-radius: 6px; overflow: hidden; }
    .pane .img-wrap { position: relative; width: 100%; height: 420px;
                      background: #eceff3; border-radius: 6px; display: flex;
                      align-items: center; justify-content: center; overflow: hidden; }
    .pane .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain;
                          display: block; }
    .pane .img-wrap .ann-bbox { position: absolute; border: 2px solid #1b6f5f;
                                background: rgba(27,111,95,0.10); pointer-events: none; }
    .pane .err { color: #b94a48; font-size: 13px; padding: 8px; background: #fdecec;
                 border-radius: 6px; white-space: pre-wrap; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; }
    .pill.idle { background: #eceff3; color: #6a7180; }
    .pill.run  { background: #e7effa; color: #2a4a7a; }
    .pill.ok   { background: #e6f3ef; color: #1b6f5f; }
    .pill.err  { background: #fdecec; color: #b94a48; }
    .status { margin-top: 8px; font-size: 12px; color: #6a7180; min-height: 16px; }
    .small { font-size: 12px; color: #6a7180; }
  </style>
</head>
<body>
<main>
  <h1>SAM 3D Body — ours vs pytorch</h1>
  <div class="sub">
    Single-image full-body 3D mesh recovery, side-by-side. Drop an image,
    optionally draw or type a bbox, then click <b>Run</b>.
    Server: <span class="small" id="origin"></span>
  </div>

  <form id="form" class="panel">
    <div class="row">
      <div>
        <label for="file">Input image (PNG / JPG)</label>
        <input id="file" type="file" accept="image/*">
        <div id="preview-wrap">
          <img id="preview" alt="">
          <div id="bbox-ov"></div>
        </div>
        <div class="auto-row">
          <input id="auto-bbox" type="checkbox" checked>
          <label for="auto-bbox" style="margin:0;">Auto-detect bbox (RT-DETR-S, ours runs first)</label>
        </div>
        <label style="margin-top:6px;">Bbox <small style="color:#6a7180;font-weight:400">(drag on preview, or type)</small></label>
        <div class="bbox-row">
          <input id="x0" type="number" placeholder="x0">
          <input id="y0" type="number" placeholder="y0">
          <input id="x1" type="number" placeholder="x1">
          <input id="y1" type="number" placeholder="y1">
        </div>
      </div>
      <div>
        <label>&nbsp;</label>
        <button type="submit" id="go">Run both backends</button>
        <div class="status" id="status"></div>
        <div class="small" id="health" style="margin-top:8px;"></div>
      </div>
    </div>
  </form>

  <section class="panes">
    <div class="pane" id="pane-input">
      <h3>Input image <span class="pill idle" id="pill-input">idle</span></h3>
      <div class="meta" id="meta-input"></div>
      <div class="img-wrap" id="wrap-input">
        <img id="big-preview" alt="">
        <div class="ann-bbox" id="ann-input" style="display:none;"></div>
      </div>
    </div>
    <div class="pane" id="pane-ours">
      <h3>Ours (C runner) <span class="pill idle" id="pill-ours">idle</span></h3>
      <div class="meta" id="meta-ours"></div>
      <div class="canvas-wrap" id="wrap-ours"></div>
      <div class="err" id="err-ours" style="display:none;"></div>
    </div>
    <div class="pane" id="pane-torch">
      <h3>PyTorch reference <span class="pill idle" id="pill-torch">idle</span></h3>
      <div class="meta" id="meta-torch"></div>
      <div class="canvas-wrap" id="wrap-torch"></div>
      <div class="err" id="err-torch" style="display:none;"></div>
    </div>
  </section>
</main>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader }     from 'three/addons/loaders/OBJLoader.js';

const $ = id => document.getElementById(id);
const ORIGIN = location.origin;
$('origin').textContent = ORIGIN;

let IMAGE_B64 = null, IMAGE_W = 0, IMAGE_H = 0, IMAGE_EXT = 'jpg';
let LAST_BIG_URL = null;

function setPill(el, kind, text) {
  el.className = 'pill ' + kind;
  el.textContent = text;
}

/* ---- Health ---- */
async function checkHealth() {
  try {
    const r = await fetch(ORIGIN + '/health');
    const d = await r.json();
    const b = d.backends || {};
    $('health').textContent = `backends — ours: ${b.ours ? 'on' : 'off'}, pytorch: ${b.pytorch ? 'on' : 'off'}`;
  } catch (e) {
    $('health').textContent = 'server not reachable: ' + (e.message || e);
  }
}
checkHealth();

/* ---- Image upload ---- */
function setImage(file, url) {
  IMAGE_EXT = (file.name.split('.').pop() || 'jpg').toLowerCase();
  if (!['jpg','jpeg','png','webp'].includes(IMAGE_EXT)) IMAGE_EXT = 'jpg';
  const img = $('preview'); img.src = url;
  img.onload = () => { IMAGE_W = img.naturalWidth; IMAGE_H = img.naturalHeight;
    $('big-preview').src = url;
    $('meta-input').textContent =
      `size=${IMAGE_W}×${IMAGE_H}  ext=${IMAGE_EXT}`;
    setPill($('pill-input'), 'ok', 'loaded');
    fitInputBbox();
  };
  if (LAST_BIG_URL) URL.revokeObjectURL(LAST_BIG_URL);
  LAST_BIG_URL = url;
}

$('file').addEventListener('change', async ev => {
  const f = ev.target.files[0]; if (!f) return;
  const buf = await f.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  IMAGE_B64 = btoa(bin);
  setImage(f, URL.createObjectURL(f));
  for (const k of ['x0','y0','x1','y1']) $(k).value = '';
  $('bbox-ov').style.display = 'none';
});

/* ---- Bbox draw on small preview ---- */
(function bboxDraw() {
  const img = $('preview'), ov = $('bbox-ov');
  let dragging = false, sx = 0, sy = 0;
  const px = (cx, cy) => {
    const r = img.getBoundingClientRect();
    return { x: cx - r.left, y: cy - r.top, w: r.width, h: r.height };
  };
  const setBox = (x0, y0, x1, y1, rect) => {
    const left = Math.min(x0,x1), top = Math.min(y0,y1);
    const w = Math.abs(x1-x0), h = Math.abs(y1-y0);
    ov.style.left = left+'px'; ov.style.top = top+'px';
    ov.style.width = w+'px';   ov.style.height = h+'px';
    ov.style.display = (w>2 && h>2) ? 'block' : 'none';
    if (IMAGE_W && IMAGE_H && rect) {
      const sx = IMAGE_W/rect.w, sy = IMAGE_H/rect.h;
      $('x0').value = (Math.min(x0,x1)*sx).toFixed(0);
      $('y0').value = (Math.min(y0,y1)*sy).toFixed(0);
      $('x1').value = (Math.max(x0,x1)*sx).toFixed(0);
      $('y1').value = (Math.max(y0,y1)*sy).toFixed(0);
    }
  };
  img.addEventListener('mousedown', e => {
    if (!IMAGE_W) return;
    e.preventDefault();
    const p = px(e.clientX, e.clientY); sx = p.x; sy = p.y; dragging = true;
    $('auto-bbox').checked = false;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const p = px(e.clientX, e.clientY);
    const ex = Math.max(0, Math.min(p.x, p.w));
    const ey = Math.max(0, Math.min(p.y, p.h));
    setBox(sx, sy, ex, ey, p);
  });
  window.addEventListener('mouseup', () => { dragging = false; });
})();

/* ---- Big preview bbox annotation ---- */
function fitInputBbox(bboxImgSpace) {
  const ann = $('ann-input'), big = $('big-preview');
  if (!bboxImgSpace || !IMAGE_W || !IMAGE_H) {
    ann.style.display = 'none'; return;
  }
  const r = big.getBoundingClientRect();
  const wrapR = $('wrap-input').getBoundingClientRect();
  // Image is centered, object-fit:contain
  const sx = r.width / IMAGE_W, sy = r.height / IMAGE_H;
  const off_x = r.left - wrapR.left, off_y = r.top - wrapR.top;
  const [x0,y0,x1,y1] = bboxImgSpace;
  ann.style.left   = (off_x + x0*sx) + 'px';
  ann.style.top    = (off_y + y0*sy) + 'px';
  ann.style.width  = ((x1-x0)*sx) + 'px';
  ann.style.height = ((y1-y0)*sy) + 'px';
  ann.style.display = 'block';
}

/* ---- 3D viewer ---- */
function attachViewer(wrap, objText) {
  // Clear any prior renderer
  while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x1a1c20);
  wrap.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0xffffff, 0x404050, 1.0));
  const dl = new THREE.DirectionalLight(0xffffff, 0.6);
  dl.position.set(2, 4, 5); scene.add(dl);

  const camera = new THREE.PerspectiveCamera(35, W/H, 0.01, 100);
  camera.position.set(0, 0, 2.5);
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  const obj = new OBJLoader().parse(objText);
  obj.traverse(c => {
    if (c.isMesh) {
      c.material = new THREE.MeshStandardMaterial({
        color: 0xc7d0d8, roughness: 0.6, metalness: 0.0, flatShading: true,
      });
      c.geometry.computeVertexNormals();
    }
  });
  // Camera-space mesh has Y-down; flip so OrbitControls' default Y-up works.
  obj.rotation.x = Math.PI;
  scene.add(obj);

  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const dist = maxDim / (2*Math.tan(THREE.MathUtils.degToRad(camera.fov)/2)) * 1.5;
  camera.position.copy(center).add(new THREE.Vector3(0, 0, dist));
  controls.target.copy(center);
  camera.near = Math.max(0.001, dist*0.01); camera.far = dist*100;
  camera.updateProjectionMatrix();

  let alive = true;
  const animate = () => { if (!alive) return; controls.update();
                          renderer.render(scene, camera);
                          requestAnimationFrame(animate); };
  animate();
  const ro = new ResizeObserver(() => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
  });
  ro.observe(wrap);
  return () => { alive = false; ro.disconnect(); renderer.dispose(); };
}

/* ---- Run ---- */
function getBboxFromForm() {
  const auto = $('auto-bbox').checked;
  if (auto) {
    if (!['x0','y0','x1','y1'].some(k => $(k).value !== '')) return null;
  }
  const v = ['x0','y0','x1','y1'].map(k => parseFloat($(k).value));
  if (v.some(x => !isFinite(x))) return null;
  return v;
}

function fmtNum(x, d=3) {
  if (x === null || x === undefined) return '–';
  if (Array.isArray(x)) return '[' + x.map(v => fmtNum(v,d)).join(', ') + ']';
  return Number(x).toFixed(d);
}

function renderMeta(name, side, timing_ms) {
  const el = $('meta-' + name);
  if (!side) { el.textContent = ''; return; }
  const im = side.image || {};
  el.textContent =
    `time=${timing_ms} ms  V=${(side.n_verts||'?')}  F=${(side.n_faces||'?')}\n` +
    `bbox=${fmtNum(side.bbox, 1)}\n` +
    `cam_t=${fmtNum(side.cam_t, 3)}  focal=${fmtNum(side.focal_px, 1)}`;
}

const VIEWER_DESTROY = { ours: null, torch: null };

$('form').addEventListener('submit', async ev => {
  ev.preventDefault();
  if (!IMAGE_B64) { $('status').textContent = 'pick an image first'; return; }
  $('go').disabled = true;
  $('status').textContent = 'running…';
  for (const k of ['ours','torch']) {
    setPill($('pill-' + k), 'run', 'running');
    $('err-' + k).style.display = 'none';
    $('meta-' + k).textContent = '';
    if (VIEWER_DESTROY[k]) { VIEWER_DESTROY[k](); VIEWER_DESTROY[k] = null; }
    const w = $('wrap-' + (k === 'torch' ? 'torch' : k));
    while (w.firstChild) w.removeChild(w.firstChild);
  }

  const body = {
    image_b64: IMAGE_B64,
    image_ext: IMAGE_EXT,
    bbox: getBboxFromForm(),
    auto_thresh: 0.5,
    backends: ['ours','pytorch'],
  };
  let resp;
  try {
    const r = await fetch(ORIGIN + '/v1/infer', {
      method: 'POST', headers: {'content-type':'application/json'},
      body: JSON.stringify(body),
    });
    resp = await r.json();
    if (!r.ok) throw new Error(resp.error || ('HTTP ' + r.status));
  } catch (e) {
    $('status').textContent = 'request failed: ' + (e.message || e);
    setPill($('pill-ours'),  'err', 'failed');
    setPill($('pill-torch'), 'err', 'failed');
    $('go').disabled = false; return;
  }

  $('status').textContent = `total=${(resp.timings_ms||{}).total||'?'} ms`;
  fitInputBbox(resp.bbox_used);

  // ours pane
  if (resp.ours) {
    const objText = atob(resp.ours.obj_b64);
    const meta = Object.assign({}, resp.ours.json || {},
                  { n_verts: countVerts(objText), n_faces: countFaces(objText) });
    renderMeta('ours', meta, resp.ours.timing_ms);
    VIEWER_DESTROY.ours = attachViewer($('wrap-ours'), objText);
    setPill($('pill-ours'), 'ok', 'ok');
  } else {
    setPill($('pill-ours'), 'err', 'failed');
    const e = (resp.errors||{}).ours || 'no result';
    $('err-ours').textContent = e; $('err-ours').style.display = 'block';
  }

  // pytorch pane
  if (resp.pytorch) {
    const objText = atob(resp.pytorch.obj_b64);
    const meta = Object.assign({}, resp.pytorch.json || {},
                  { n_verts: countVerts(objText), n_faces: countFaces(objText) });
    renderMeta('torch', meta, resp.pytorch.timing_ms);
    VIEWER_DESTROY.torch = attachViewer($('wrap-torch'), objText);
    setPill($('pill-torch'), 'ok', 'ok');
  } else {
    setPill($('pill-torch'), 'err', 'failed');
    const e = (resp.errors||{}).pytorch || 'no result';
    $('err-torch').textContent = e; $('err-torch').style.display = 'block';
  }
  $('go').disabled = false;
});

function countVerts(t) { return (t.match(/^v /gm) || []).length; }
function countFaces(t) { return (t.match(/^f /gm) || []).length; }

window.addEventListener('resize', () => fitInputBbox(window._lastBbox));
</script>
</body>
</html>
