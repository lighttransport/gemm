<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAM 3.1 Segmentation — PyTorch ref</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #f7f8fb; color: #15171a; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px 18px; }
    h1 { font-size: 26px; margin: 0 0 4px; }
    .sub { color: #6a7180; font-size: 13px; margin-bottom: 18px; }
    form, .panel { background: #fff; border: 1px solid #d9dde5; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 650; margin: 10px 0 6px; }
    input, select, button { width: 100%; border: 1px solid #bcc4d0; border-radius: 6px; font: inherit; padding: 9px 10px; background: #fff; }
    button { margin-top: 14px; background: #5b3b8f; color: #fff; border: 0; font-weight: 700; cursor: pointer; }
    button[disabled] { background: #9aa4b1; cursor: not-allowed; }
    button.cancel { background: #b94a48; }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-row button { margin-top: 0; }
    .status { margin-top: 8px; font-size: 12px; color: #6a7180; min-height: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .canvas-wrap { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-start; }
    .canvas-wrap canvas { max-width: 640px; border: 1px solid #d9dde5; border-radius: 6px; background: #1a1c20; }
    .masks { flex: 1 1 280px; min-width: 240px; }
    .mask-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; cursor: pointer; }
    .mask-row:hover { background: #eef1f6; }
    .mask-row.off { opacity: 0.45; }
    .swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .meta { font-size: 12px; color: #6a7180; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #15171a; color: #e6e8ec; padding: 12px; border-radius: 6px; max-height: 240px; overflow: auto; font-size: 12px; }
    details summary { cursor: pointer; font-size: 13px; color: #4d5563; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #efeaf7; color: #5b3b8f; margin-left: 8px; }
    #toast { position: fixed; top: 18px; right: 18px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; max-width: min(420px, 90vw); }
    .toast-item { pointer-events: auto; background: #15171a; color: #fff; padding: 10px 14px; border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,.18); font-size: 13px; line-height: 1.35; border-left: 4px solid #8a8f98; cursor: pointer; word-break: break-word; }
    .toast-item.error { border-left-color: #e5484d; background: #2a1416; }
    .toast-item.info  { border-left-color: #1b6f5f; }
    .toast-item .t-title { font-weight: 700; margin-bottom: 2px; }
  </style>
</head>
<body>
<div id="toast"></div>
<main>
  <h1>SAM 3.1 segmentation
    <span class="pill" id="modelPill">pytorch-ref</span>
  </h1>
  <div class="sub">
    PyTorch-reference runner for SAM 3.1 (ground truth, for side-by-side
    comparison against the C runner). POSTs <code>/v1/infer</code>.
    Endpoint is configurable via <code>window.SERVER_URL</code>.
  </div>

  <form id="form" class="panel">
    <div class="row">
      <div>
        <label for="backend">Backend (torch device)</label>
        <select id="backend">
          <option value="cuda">cuda</option>
          <option value="cpu">cpu</option>
        </select>
      </div>
      <div>
        <label for="precision">Precision</label>
        <select id="precision">
          <option value="fp32" selected>fp32</option>
          <option value="fp16">fp16</option>
          <option value="bf16">bf16</option>
        </select>
      </div>
      <div>
        <label for="image">Image</label>
        <input id="image" type="file" accept="image/*">
      </div>
      <div>
        <label for="server">Server</label>
        <input id="server" value="">
      </div>
    </div>

    <label for="text">Text prompt</label>
    <input id="text" placeholder="e.g. cat, mountain, person" required>

    <details>
      <summary>Advanced (thresholds, max masks)</summary>
      <div class="row">
        <div><label for="score">score_threshold</label><input id="score" type="number" step="0.05" value="0.3"></div>
        <div><label for="mask">mask_threshold</label><input id="mask" type="number" step="0.05" value="0.5"></div>
        <div><label for="maxn">max_masks</label><input id="maxn" type="number" min="1" max="64" value="8"></div>
      </div>
    </details>

    <div class="btn-row">
      <button type="submit" id="go">Segment (ref)</button>
      <button type="button" id="cancel" class="cancel" disabled>Cancel</button>
    </div>
    <div class="status" id="status"></div>
  </form>

  <section class="panel" id="resultPanel" hidden>
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="masks" id="maskList"></div>
    </div>
  </section>

  <section class="panel">
    <details>
      <summary>Raw JSON response</summary>
      <pre id="log">No request sent yet.</pre>
    </details>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);

function showToast(msg, opts) {
  opts = opts || {};
  const host = document.getElementById('toast');
  if (!host) { console.warn('toast:', msg); return; }
  const el = document.createElement('div');
  el.className = 'toast-item ' + (opts.kind || 'error');
  if (opts.title) {
    const t = document.createElement('div');
    t.className = 't-title';
    t.textContent = opts.title;
    el.appendChild(t);
  }
  const b = document.createElement('div');
  b.textContent = msg;
  el.appendChild(b);
  host.appendChild(el);
  const dismiss = () => { if (el.parentNode) el.parentNode.removeChild(el); };
  el.addEventListener('click', dismiss);
  setTimeout(dismiss, opts.timeout || 8000);
}

function extractError(json, status) {
  if (!json) return 'HTTP ' + status;
  if (typeof json.error === 'string') return json.error;
  if (json.error && typeof json.error === 'object') {
    const m = json.error.message || json.error.code || JSON.stringify(json.error);
    return m;
  }
  return json.message || ('HTTP ' + status);
}
const COLORS = [
  [255, 87, 87], [88, 167, 255], [255, 198, 60], [126, 217, 87],
  [186, 104, 200], [255, 138, 101], [77, 208, 225], [240, 98, 146],
  [129, 199, 132], [149, 117, 205], [255, 167, 38], [79, 195, 247],
  [244, 143, 177], [156, 204, 101], [102, 187, 106], [171, 71, 188]
];

// Default to same-origin so opening the page at :8081 just works.
$('server').value = window.SERVER_URL || location.origin;

let srcImage = null;
let masks = [];

function readFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(String(r.result).split(',')[1] || '');
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function loadImg(dataUrl) {
  return new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = dataUrl;
  });
}

function redraw() {
  const c = $('canvas');
  if (!srcImage) return;
  const W = srcImage.naturalWidth, H = srcImage.naturalHeight;
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  ctx.drawImage(srcImage, 0, 0);

  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tctx = tmp.getContext('2d');

  for (const m of masks) {
    if (!m.on) continue;
    tctx.clearRect(0, 0, W, H);
    tctx.drawImage(m.img, 0, 0, W, H);
    const id = tctx.getImageData(0, 0, W, H);
    const [r, g, b] = m.color;
    const data = id.data;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i] > 127) {
        data[i]   = r;
        data[i+1] = g;
        data[i+2] = b;
        data[i+3] = 140;
      } else {
        data[i+3] = 0;
      }
    }
    tctx.putImageData(id, 0, 0);
    ctx.drawImage(tmp, 0, 0);

    ctx.strokeStyle = `rgb(${r},${g},${b})`;
    ctx.lineWidth = Math.max(2, Math.round(W / 400));
    const [x0, y0, x1, y1] = m.box;
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);
  }
}

function buildMaskList() {
  const list = $('maskList');
  list.innerHTML = '';
  masks.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'mask-row';
    const sw = document.createElement('div');
    sw.className = 'swatch';
    sw.style.background = `rgb(${m.color.join(',')})`;
    const label = document.createElement('div');
    label.innerHTML = `<div>mask ${i+1} <span class="meta">score ${m.score.toFixed(3)}</span></div>` +
                      `<div class="meta">box [${m.box.map(v => v.toFixed(0)).join(', ')}]</div>`;
    row.appendChild(sw);
    row.appendChild(label);
    row.addEventListener('click', () => {
      m.on = !m.on;
      row.classList.toggle('off', !m.on);
      redraw();
    });
    list.appendChild(row);
  });
}

let activeAbort = null;
let elapsedTimer = null;

function setRunning(on) {
  $('go').disabled = on;
  $('cancel').disabled = !on;
}

function startElapsed(t0) {
  stopElapsed();
  elapsedTimer = setInterval(() => {
    const s = ((performance.now() - t0) / 1000).toFixed(1);
    $('status').textContent = `Inference running… ${s}s`;
  }, 100);
}

function stopElapsed() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

$('cancel').addEventListener('click', () => {
  if (activeAbort) {
    activeAbort.abort();
    $('status').textContent = 'Cancel sent — fetch aborted on the client.';
  }
});

$('form').addEventListener('submit', async ev => {
  ev.preventDefault();
  const file = $('image').files[0];
  if (!file) { $('log').textContent = 'Pick an image first.'; return; }
  setRunning(true);
  $('log').textContent = 'Encoding image and POSTing /v1/infer...';
  $('status').textContent = '';

  if (activeAbort) { try { activeAbort.abort(); } catch (_) {} }
  activeAbort = new AbortController();
  const myAbort = activeAbort;

  try {
    const b64 = await readFile(file);
    srcImage = await loadImg('data:' + (file.type || 'image/png') + ';base64,' + b64);
    masks = [];
    buildMaskList();
    redraw();
    $('resultPanel').hidden = false;

    const payload = {
      model: 'sam3.1',
      task: 'segmentation',
      backend: $('backend').value,
      inputs: { text: $('text').value, image_base64: b64 },
      weights: {},
      params: {
        score_threshold: parseFloat($('score').value) || 0.3,
        mask_threshold:  parseFloat($('mask').value)  || 0.5,
        max_masks:       parseInt($('maxn').value, 10) || 8,
        precision:       $('precision') ? $('precision').value : 'fp32'
      }
    };

    const base = ($('server').value || location.origin).replace(/\/+$/, '');
    const t0 = performance.now();
    startElapsed(t0);
    const res = await fetch(base + '/v1/infer', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(payload),
      signal: myAbort.signal
    });
    const dt = (performance.now() - t0).toFixed(0);
    const json = await res.json();
    stopElapsed();
    $('status').textContent = `Done in ${dt} ms.`;
    $('log').textContent = `HTTP ${res.status} (${dt} ms)\n` + JSON.stringify(json, null, 2);

    if (!res.ok || !json || !json.ok) {
      const msg = extractError(json, res.status);
      $('status').textContent = `Error: ${msg}`;
      showToast(msg, { title: `HTTP ${res.status}`, kind: 'error' });
      return;
    }

    const outs = (json.outputs || []).filter(o => o.type === 'mask');
    masks = await Promise.all(outs.map(async (o, i) => ({
      img:   await loadImg('data:' + (o.mime || 'image/png') + ';base64,' + o.data_base64),
      score: o.score,
      box:   o.box,
      color: COLORS[i % COLORS.length],
      on:    true
    })));
    buildMaskList();
    redraw();
  } catch (err) {
    stopElapsed();
    if (err && err.name === 'AbortError') {
      $('log').textContent = 'Request canceled by user.\nNote: the PyTorch ref server continues computing until finished.';
      $('status').textContent = 'Canceled.';
    } else {
      const msg = String(err && err.message || err);
      $('log').textContent = String(err && err.stack || err);
      $('status').textContent = 'Error: ' + msg;
      showToast(msg, { title: 'Request failed', kind: 'error' });
    }
  } finally {
    if (activeAbort === myAbort) activeAbort = null;
    setRunning(false);
  }
});
</script>
</body>
</html>
